name: p9_Redpanda_ticketing_spark

networks:
  redpanda_network:
    driver: bridge

volumes:
  redpanda-0: null

services:
  redpanda-0:
    image: docker.redpanda.com/redpandadata/redpanda:v26.1.9
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda-0:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda-0:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda-0:33145
      - --advertise-rpc-addr redpanda-0:33145
      - --mode dev-container
      - --smp 1
      - --default-log-level=info
    container_name: redpanda-0
    volumes:
      - redpanda-0:/var/lib/redpanda/data
    networks:
      - redpanda_network
    ports:
      - 18081:18081
      - 18082:18082
      - 19092:19092
      - 19644:9644
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info"]
      interval: 5s
      timeout: 5s
      retries: 10
  postgres:
    image: postgres:17
    container_name: postgres
    networks:
      - redpanda_network
    environment:
      POSTGRES_DB: tickets_db
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d tickets_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  console:
    container_name: redpanda-console
    image: docker.redpanda.com/redpandadata/console:v3.7.4
    networks:
      - redpanda_network
    entrypoint: /bin/sh
    command: -c 'echo "$$CONSOLE_CONFIG_FILE" > /tmp/config.yml; /app/console'
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
      CONSOLE_CONFIG_FILE: |
        kafka:
          brokers: ["redpanda-0:9092"]
        schemaRegistry:
          enabled: true
          urls: ["http://redpanda-0:8081"]
        redpanda:
          adminApi:
            enabled: true
            urls: ["http://redpanda-0:9644"]
    ports:
      - 8080:8080
    depends_on:
      redpanda-0:
        condition: service_healthy

  producer:
    build: ./producer
    container_name: producer
    networks:
      - redpanda_network
    depends_on:
      redpanda-0:
        condition: service_healthy

  spark:
    build: ./spark
    container_name: spark
    networks:
      - redpanda_network
    depends_on:
      redpanda-0:
        condition: service_healthy # pour que Spark démarre en même temps que le producer
      postgres:
        condition: service_healthy   
    volumes:
      - ./output:/opt/spark/work/output
    ports:
      - 4040:4040